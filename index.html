    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary-color: #0B1F3A;
            --secondary-color: #3b82f6;
            --accent-color: #22d3ee;
            --bg-dark: #020617;
            --bg-soft: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(15, 23, 42, 0.65);
            --glass-border: rgba(255, 255, 255, 0.08);
        }
    }

    @layer base {
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            scroll-behavior: smooth;
        }
        
        .brand-font {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
        }
    }

    @layer components {
        .btn {
            @apply px-8 py-4 rounded-xl font-bold transition-all duration-300 flex items-center justify-center gap-2;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            color: white;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.4);
        }
        
        .btn-primary:hover {
            @apply scale-[1.03] brightness-110;
            box-shadow: 0 20px 30px -10px rgba(59, 130, 246, 0.5);
        }
        
        .btn-outline {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }
        
        .btn-outline:hover {
            @apply bg-white/10 border-white/20 scale-[1.03];
        }
        
        .card-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            @apply rounded-2xl transition-all duration-300;
        }

        .glass-slide {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            @apply rounded-2xl transition-all duration-300;
        }
        
        .section-padding {
            @apply py-20 md:py-32 px-4 md:px-6;
        }
        
        .container {
            max-width: 1280px;
            @apply mx-auto;
        }
        
        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        
        .news-ticker {
            display: flex;
            animation: scroll-left 40s linear infinite;
            width: fit-content;
        }
        
        .ticker-item {
            @apply whitespace-nowrap px-12 text-lg font-medium text-[var(--accent-color)] opacity-80 uppercase tracking-widest;
        }
        
        .scroll-animate {
            @apply opacity-0 translate-y-8 transition-all duration-700 ease-out;
        }
        
        .scroll-animate.visible {
            @apply opacity-100 translate-y-0;
        }

        .hover-lift:hover {
            @apply -translate-y-2 shadow-2xl shadow-blue-500/10;
        }

        .hover-scale:hover {
            @apply scale-[1.02];
        }

        .cta-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.95; transform: scale(1.02); }
        }
    }

    <style>
        .magnetic-wrap {
            display: inline-block;
        }
        
        .glow-on-hover {
            position: relative;
            overflow: hidden;
        }
        
        .glow-on-hover::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .glow-on-hover:hover::after {
            opacity: 1;
        }

        @keyframes float-fast {

            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            transition: background-position-x 1s;
        }

        .reveal-text.visible {

        }
    </style>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.style.opacity = '0';
                    preloader.style.visibility = 'hidden';
                    setTimeout(function() {
                        preloader.style.display = 'none';
                    }, 800);
                }
            }, 1200);
        });
        
        window.addEventListener('scroll', function() {
            var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            var scrolled = (winScroll / height) * 100;
            var progressBar = document.getElementById('scroll-progress');
            if (progressBar) progressBar.style.width = scrolled + '%';
            
            var scrollBtn = document.getElementById('scroll-to-top');
            if (scrollBtn) {
                if (winScroll > 300) {
                    scrollBtn.classList.add('visible');
                } else {
                    scrollBtn.classList.remove('visible');
                }
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            var lazyImages = document.querySelectorAll('img[data-src]');
            lazyImages.forEach(function(img) {
                img.src = img.dataset.src;
            });
            
            var observerOptions = {
                threshold: 0.05,
                rootMargin: '0px 0px -80px 0px'
            };
            
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting && !entry.target.classList.contains('visible')) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);
            
            var elements = document.querySelectorAll('.scroll-animate, .stagger-item');
            for (var i = 0; i < elements.length; i++) {
                observer.observe(elements[i]);
            }
            
            var scrollTimeout;
            window.addEventListener('scroll', function() {
                if (scrollTimeout) cancelAnimationFrame(scrollTimeout);
                scrollTimeout = requestAnimationFrame(function() {
                    var scrolled = window.pageYOffset;
                    var parallaxEls = document.querySelectorAll('.parallax');
                    for (var j = 0; j < parallaxEls.length; j++) {
                        var speed = parallaxEls[j].dataset.speed || 0.5;
                        parallaxEls[j].style.transform = 'translateY(' + (scrolled * speed) + 'px)';
                    }
                });
            }, { passive: true });
        });
    </script>
