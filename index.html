    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var preloader = document.getElementById('preloader');
                if (preloader) {
                    preloader.style.opacity = '0';
                    preloader.style.visibility = 'hidden';
                    setTimeout(function() {
                        preloader.style.display = 'none';
                    }, 800);
                }
            }, 1200);
        });
        
        window.addEventListener('scroll', function() {
            var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            var scrolled = (winScroll / height) * 100;
            var progressBar = document.getElementById('scroll-progress');
            if (progressBar) progressBar.style.width = scrolled + '%';
            
            var scrollBtn = document.getElementById('scroll-to-top');
            if (scrollBtn) {
                if (winScroll > 300) {
                    scrollBtn.classList.add('visible');
                } else {
                    scrollBtn.classList.remove('visible');
                }
            }
        });
        
        document.addEventListener('DOMContentLoaded', function() {
            var lazyImages = document.querySelectorAll('img[data-src]');
            lazyImages.forEach(function(img) {
                img.src = img.dataset.src;
            });
            
            var observerOptions = {
                threshold: 0.05,
                rootMargin: '0px 0px -80px 0px'
            };
            
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting && !entry.target.classList.contains('visible')) {
                        entry.target.classList.add('visible');
                    }
                });
            }, observerOptions);
            
            var elements = document.querySelectorAll('.scroll-animate, .stagger-item');
            for (var i = 0; i < elements.length; i++) {
                observer.observe(elements[i]);
            }

            // Custom Cursor Logic
            const cursor = document.getElementById('custom-cursor');
            const follower = document.getElementById('cursor-follower');
            
            if (cursor && follower) {
                document.addEventListener('mousemove', (e) => {
                    cursor.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
                    follower.style.transform = `translate3d(${e.clientX - 16}px, ${e.clientY - 16}px, 0)`;
                });

                document.addEventListener('mousedown', () => {
                    document.body.classList.add('cursor-active');
                });

                document.addEventListener('mouseup', () => {
                    document.body.classList.remove('cursor-active');
                });

                const interactiveElements = document.querySelectorAll('button, a, input, select, textarea, .cursor-pointer');
                interactiveElements.forEach((el) => {
                    el.addEventListener('mouseenter', () => follower.style.transform += ' scale(2)');
                    el.addEventListener('mouseleave', () => follower.style.transform = follower.style.transform.replace(' scale(2)', ''));
                });
            }

            // Magnetic Buttons Logic
            const magneticButtons = document.querySelectorAll('.btn-interactive');
            magneticButtons.forEach((btn) => {
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    btn.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px) scale(1.05)`;
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.transform = 'translate(0, 0) scale(1)';
                });
            });
            
            var scrollTimeout;
            window.addEventListener('scroll', function() {
                if (scrollTimeout) cancelAnimationFrame(scrollTimeout);
                scrollTimeout = requestAnimationFrame(function() {
                    var scrolled = window.pageYOffset;
                    var parallaxEls = document.querySelectorAll('.parallax');
                    for (var j = 0; j < parallaxEls.length; j++) {
                        var speed = parallaxEls[j].dataset.speed || 0.5;
                        parallaxEls[j].style.transform = 'translateY(' + (scrolled * speed) + 'px)';
                    }
                });
            }, { passive: true });
        });
    </script>
</body>
</html>
